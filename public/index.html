<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom Clone - SimplePeer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); color:#fff; margin:0; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
h1 {margin-top:20px;font-size:2.5rem;text-shadow:2px 2px 5px rgba(0,0,0,0.3);}
#controls {margin:20px 0;display:flex;gap:10px;flex-wrap:wrap;}
input[type="text"]{padding:10px;border-radius:10px;border:none;width:150px;font-size:1rem;}
button{padding:10px 20px;border:none;border-radius:10px;background-color:#ff6b6b;color:#fff;font-size:1rem;cursor:pointer;transition:0.3s;}
button:hover{background-color:#ff8787;}
#videos {display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:20px;width:90%;}
video {border-radius:15px;max-width:300px;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<h1>اتصل بصديقك</h1>

<div id="controls">
<button onclick="createRoom()">إنشاء غرفة</button>
<input type="text" id="roomId" placeholder="أدخل رمز الغرفة" />
<button onclick="joinRoom()">انضم للغرفة</button>
<button id="toggleCam">إيقاف الكاميرا</button>
<button id="switchCam">تبديل الكاميرا</button>
</div>

<div id="videos">
<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script src="script.js"></script>
</body>
</html>
